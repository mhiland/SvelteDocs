# CI/CD pipeline for @dependably/svelte-docs
#
# GitLab is the source of truth; GitHub (github.com/mhiland/SvelteDocs) is a
# downstream public mirror. The package ships as Svelte SOURCE and is private /
# UNLICENSED, so there is no registry-publish step — the pipeline lints, builds
# (compile-checks), generates an SBOM, ships it to Dependency-Track, and (on a
# manual gate, default branch only) mirrors main + tags back to GitHub.
#
# Flow:  test  →  build  →  sbom  →  sbom-publish  →  mirror (manual)
#
#   test           lint + format:check + syntax check + secret scan on every push/MR
#   build          exercise the build toolkit (demo:content) + compile the engine (build:lib)
#   sbom           generate a CycloneDX SBOM (every pipeline), kept as an artifact
#   sbom-publish   upload the SBOM to Dependency-Track on the default branch (its own
#                  stage so it never races the `sbom` job in the shared build dir)
#   publish-github manual gate (last stage) that mirrors the default branch + tags
#                  to the public GitHub repo — reachable only after every earlier
#                  stage has passed. Pushing the tag there fires the GitHub Release
#                  workflow (.github/workflows/release.yml).
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   dependencyTrack_url   Dependency-Track base URL, e.g. https://dtrack.example.com
#   dependencyTrack_token DT API key with BOM_UPLOAD + PROJECT_CREATION_UPLOAD perms
#   GITHUB_TOKEN          GitHub PAT (or fine-grained token) with `contents:write`
#                         on mhiland/SvelteDocs — used by `publish-github`. Set
#                         Protected + Masked (default branch only).
#   GITHUB_MIRROR_REPO    (optional) override the GitHub push URL; defaults to
#                         https://github.com/mhiland/SvelteDocs.git

# Run ONE pipeline per change: a merge-request pipeline when an MR is open, the
# branch pipeline on the default branch, and tag pipelines — while suppressing the
# redundant branch pipeline when an MR is already open.
#
# Auto-cancel superseded pipelines: when a new commit is pushed to a ref, cancel
# the still-running `interruptible` jobs of older pipelines on that ref. The
# external-write jobs (sbom-publish, publish-github) opt out below so an in-flight
# upload/push is never killed mid-write.
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
  auto_cancel:
    on_new_commit: interruptible

default:
  # node:22 — the package requires Node >=22 (package.json engines), unlike the
  # node:20 sibling pipelines.
  image: node:22
  # Most jobs are read-only or idempotent and safe to cancel + re-run, so make
  # interruptible the default; the side-effecting jobs override it to false.
  interruptible: true

stages:
  - test
  - build
  - sbom
  - sbom-publish
  - mirror

# Reusable npm dependency cache (keyed on the lockfile).
.npm_install: &npm_install
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline

lint:
  stage: test
  <<: *npm_install
  script:
    - npm run lint

# Prettier formatting gate (CI gate per the project's CLAUDE.md).
format-check:
  stage: test
  <<: *npm_install
  script:
    - npm run format:check

# Syntax check of the build CLI entry points (node --check).
syntax-check:
  stage: test
  <<: *npm_install
  script:
    - npm run check

# Secret scan — fail the pipeline if a committed secret is detected. Pinned by
# digest so the scanner version can't drift under us. GIT_DEPTH: 0 fetches full
# history. We prefer an incremental scan (CI_COMMIT_BEFORE_SHA..HEAD) for speed,
# but fall back to a FULL-history scan whenever the "before" SHA is unusable —
# the all-zero sentinel on a branch's first push, or an unreachable commit after
# a force-push — so a secret hidden in earlier/rewritten history can't slip the
# gate. --only-verified keeps it fast/false-positive-free, --fail hard-fails.
secret-scan:
  stage: test
  image:
    name: trufflesecurity/trufflehog:3.95.3@sha256:9cc33bb080cac0efbbf228a17667172875b529eeeab01efcc4697adfb55f568a
    entrypoint: ['']
  variables:
    GIT_DEPTH: 0
  script:
    - |
      BEFORE="${CI_COMMIT_BEFORE_SHA}"
      if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
        echo "No usable base commit (first push / force-push) — scanning full history"
        trufflehog git file://. --only-verified --fail
      else
        trufflehog git file://. --since-commit "$BEFORE" --only-verified --fail
      fi

# Compile-check the two halves of the package. The lib ships as source (no
# transpile/publish step), so "build" verifies that everything compiles:
#   demo:content — runs the Node build toolkit end-to-end (remark/rehype/shiki/
#                  gray-matter), catching a missing runtime dep that node --check can't.
#   build:lib    — compiles the Svelte engine source via vite, catching component
#                  compile errors.
# Mirrors the existing GitHub Actions `build` job.
build:
  stage: build
  <<: *npm_install
  script:
    - npm run demo:content
    - npm run build:lib

# Software Bill of Materials (CycloneDX, spec 1.6). Generated on every pipeline
# from the installed dependency tree and kept as an artifact. cyclonedx-npm is
# pinned via devDependency + package-lock, so the tool version can't drift.
# `npm run sbom` includes the full tree (dev toolchain too) so the build's whole
# supply chain is captured.
sbom:
  stage: sbom
  <<: *npm_install
  script:
    - npm run sbom
  artifacts:
    paths:
      - sbom.json
    expire_in: 30 days

# Publish the SBOM to Dependency-Track for continuous supply-chain monitoring.
# Default branch only. Runs in its own stage after `sbom` and consumes that job's
# artifact (alpine:3 + curl).
#
# IMPORTANT — why the text fields use `--form-string`, not `-F`: in a curl `-F`
# value, a leading `@` means "read this file". The project name is the scoped
# package `@dependably/svelte-docs`, so `-F "projectName=@dependably/svelte-docs"`
# would make curl try to open a file named `dependably/svelte-docs` and fail with
# the misleading "(26) Failed to open/read local data". `--form-string` sends the
# value verbatim with no @/< interpretation. Only the actual file upload keeps
# `-F "bom=@sbom.json"`.
#
# autoCreate stands the project up on first upload; projectVersion tracks the
# package.json version so each release is a distinct BOM (read with sed since the
# alpine image has no node). The job hard-fails when the Dependency-Track
# variables aren't configured.
sbom-publish:
  stage: sbom-publish
  image: alpine:3
  # External write (uploads the BOM to Dependency-Track) — never auto-cancel mid-upload.
  interruptible: false
  needs:
    - job: sbom
      artifacts: true
  resource_group: sbom-publish
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - apk add --no-cache curl
    - |
      if [ -z "$dependencyTrack_url" ] || [ -z "$dependencyTrack_token" ]; then
        echo "ERROR: dependencyTrack_url and dependencyTrack_token must be set as CI/CD variables." >&2
        exit 1
      fi
    - |
      set -eu
      if [ ! -s sbom.json ]; then
        echo "ERROR: sbom.json (from the sbom job artifact) is missing. Directory contents:" >&2
        ls -la >&2
        exit 1
      fi
      BASE="${dependencyTrack_url%/}"
      PROJECT="@dependably/svelte-docs"
      VERSION=$(sed -n 's/^[[:space:]]*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' package.json | head -n1)
      [ -n "$VERSION" ] || VERSION=latest
      echo "Publishing SBOM ($(wc -c < sbom.json) bytes) for $PROJECT@$VERSION to $BASE"
      status=$(curl -sS -o /tmp/bom.out -w '%{http_code}' \
        -X POST "$BASE/api/v1/bom" \
        -H "X-Api-Key: $dependencyTrack_token" \
        --form-string "autoCreate=true" \
        --form-string "projectName=$PROJECT" \
        --form-string "projectVersion=$VERSION" \
        -F "bom=@sbom.json")
      case "$status" in
        200) echo "✓ SBOM uploaded";;
        *) echo "SBOM upload failed (HTTP $status):" >&2; cat /tmp/bom.out >&2; exit 1;;
      esac

# Mirror the source to the public GitHub repo (github.com/mhiland/SvelteDocs).
# GitLab stays the source of truth; this is the one-way push that makes the public
# mirror reflect a released state — and pushing a tag here fires the GitHub Release
# workflow.
#
# Gating: it lives in the LAST stage and uses no `needs:`, so it only becomes
# reachable once every earlier stage (test → build → sbom → sbom-publish) has
# succeeded on the default branch. Even then it's `when: manual`, so a human clicks
# to mirror. Default branch only; serialized via resource_group; interruptible:false
# so an in-flight push is never auto-cancelled.
#
# GIT_DEPTH: 0 turns the shallow CI clone into a full clone so the whole history
# and all tags can be pushed. Auth uses an http.extraheader carrying a base64
# Basic credential (x-access-token:<PAT>) rather than embedding the token in the
# remote URL — git never echoes the header, so the token can't leak into the
# (retained) job log even on a push error. GITHUB_TOKEN must be a Masked CI/CD variable.
publish-github:
  stage: mirror
  interruptible: false
  variables:
    GIT_DEPTH: '0'
  resource_group: publish-github
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
      allow_failure: false
  script:
    - |
      if [ -z "$GITHUB_TOKEN" ]; then
        echo "ERROR: GITHUB_TOKEN must be set as a masked CI/CD variable." >&2
        exit 1
      fi
    - GITHUB_REPO="${GITHUB_MIRROR_REPO:-https://github.com/mhiland/SvelteDocs.git}"
    - git remote remove github 2>/dev/null || true
    - git remote add github "$GITHUB_REPO"
    - |
      set -eu
      AUTH=$(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 | tr -d '\n')
      echo "Mirroring $CI_DEFAULT_BRANCH + tags to $GITHUB_REPO"
      git -c http.extraheader="Authorization: Basic ${AUTH}" \
        push github "HEAD:refs/heads/${CI_DEFAULT_BRANCH}"
      git -c http.extraheader="Authorization: Basic ${AUTH}" \
        push github --tags
    - echo "✓ Mirrored $CI_DEFAULT_BRANCH + tags to $GITHUB_REPO"
