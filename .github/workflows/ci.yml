name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Syntax check (build entry points)
        run: npm run check

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      # Exercises the build toolkit end-to-end (remark/rehype/shiki/gray-matter
      # pipeline) — catches breakage that `node --check` can't, e.g. a missing
      # runtime dependency.
      - name: Build content bundle
        run: npm run demo:content

      # Compiles the Svelte engine source via vite — catches component compile
      # errors. The lib ships as source, so this is a verification step only.
      - name: Compile engine
        run: npm run build:lib

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so diff scans have a base to compare against

      # On PRs, scan only the commits the PR introduces. base/head are explicit
      # so the action doesn't have to guess the range.
      - name: TruffleHog (PR diff)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@30d5bb91af1a771378349dbbb0c82129392acf70 # v3.95.6
        with:
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --results=verified,unknown

      # On push, scan the whole working tree. Avoids the first-push zero-SHA
      # `github.event.before` pitfall that breaks a diff range.
      - name: TruffleHog (full scan)
        if: github.event_name == 'push'
        uses: trufflesecurity/trufflehog@30d5bb91af1a771378349dbbb0c82129392acf70 # v3.95.6
        with:
          extra_args: --results=verified,unknown
